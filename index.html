<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Karlson</title>
  <script src="Build/UnityLoader.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
    }
    body {
      background: #000;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    #unityContainer {
      position: absolute;
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    // CDN base for files not hosted in this repo
    const CDN = "https://cdn.jsdelivr.net/gh/genizy/web-port@main/karlson/Build/";

    function resizeUnityContainer() {
      var container = document.getElementById("unityContainer");
      container.style.width = window.innerWidth + "px";
      container.style.height = window.innerHeight + "px";
    }

    async function loadZip(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Failed to fetch zip: " + url + " status " + response.status);
      const arrayBuffer = await response.arrayBuffer();

      const jszip = new JSZip();
      const zip = await jszip.loadAsync(arrayBuffer);

      if (zip.files["tyj.wasm.code.unityweb"]) {
        // Must use application/wasm so WebAssembly streaming compile works
        const content = await zip.file("tyj.wasm.code.unityweb").async("uint8array");
        const blob = new Blob([content], { type: "application/wasm" });
        return URL.createObjectURL(blob);
      }

      throw new Error("tyj.wasm.code.unityweb not found in zip: " + url);
    }

    async function startUnity() {
      // Extract wasm from the locally-hosted zip, with correct MIME type
      const wasmurl = await loadZip("Build/tyj.wasm.code.unityweb.zip");

      // Unity 2019 UnityLoader config — all URLs must be absolute or
      // relative to the page, NOT to a blob. Data + framework come from CDN.
      const config = {
        companyName: "Dani",
        productName: "Karlson",
        productVersion: "0.1",
        dataUrl: CDN + "tyj.data.unityweb",
        wasmCodeUrl: wasmurl,
        wasmFrameworkUrl: CDN + "tyj.wasm.framework.js",
        graphicsAPI: ["WebGL 2.0"],
        webglContextAttributes: { preserveDrawingBuffer: false },
        splashScreenStyle: "Dark",
        backgroundColor: "#231F20",
        developmentBuild: false,
        multithreading: false,
        unityVersion: "2019.2.6f1"
      };

      window.addEventListener("resize", resizeUnityContainer);
      resizeUnityContainer();

      UnityLoader.instantiate("unityContainer", config, {
        Module: {
          onRuntimeInitialized: function () {
            var loadingText = document.querySelector("#loading-text");
            if (loadingText) loadingText.remove();
          }
        }
      });
    }

    window.addEventListener("load", startUnity);
  </script>
</head>
<body>
  <div
    id="loading-text"
    style="
      color: white;
      font-size: 48px;
      font-family: cursive;
      text-align: center;
      margin-top: 20px;
    "
  >
    LOADING...
  </div>
  <div id="unityContainer"></div>
</body>
</html>
