<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Karlson</title>
  <style>
    * { margin: 0; padding: 0; border: 0; overflow: hidden; }
    body { background: #000; position: fixed; width: 100%; height: 100%; }
    #unityContainer { position: absolute; width: 100%; height: 100%; }
    #loading-text {
      color: white; font-size: 48px; font-family: cursive;
      text-align: center; margin-top: 20px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    // CDN base for large files not in the Vercel repo
    const CDN = "https://cdn.jsdelivr.net/gh/genizy/web-port@main/karlson/Build/";

    // Wasm bytes will be stored here after zip extraction, before UnityLoader runs
    let wasmBytes = null;

    function resizeUnityContainer() {
      const c = document.getElementById("unityContainer");
      c.style.width  = window.innerWidth  + "px";
      c.style.height = window.innerHeight + "px";
    }

    async function extractWasm() {
      const res = await fetch("Build/tyj.wasm.code.unityweb.zip");
      if (!res.ok) throw new Error("Zip fetch failed: " + res.status);
      const buf = await res.arrayBuffer();
      const zip = await JSZip.loadAsync(buf);
      if (!zip.files["tyj.wasm.code.unityweb"])
        throw new Error("tyj.wasm.code.unityweb not found in zip");
      wasmBytes = await zip.file("tyj.wasm.code.unityweb").async("uint8array");
      console.log("Wasm extracted:", wasmBytes.byteLength, "bytes");
    }

    function patchUnityLoader() {
      // UnityLoader.downloadJob is the function that fetches every build asset via XHR.
      // We wrap it so that when it tries to download "tyj.wasm.code.unityweb",
      // we short-circuit the XHR and call t.complete() with our pre-extracted bytes.
      const originalDownloadJob = UnityLoader.downloadJob;

      UnityLoader.downloadJob = function(e, t) {
        const url = t && t.parameters && t.parameters.url || "";

        if (url.includes("tyj.wasm.code.unityweb") && wasmBytes) {
          console.log("Intercepted wasm download, serving from memory:", url);
          // UnityLoader.Compression.decompress expects a Uint8Array.
          // Our bytes are already raw (no gzip/brotli), so identity decompress returns them as-is.
          // t.complete() is what downloadJob calls after decompress finishes.
          UnityLoader.Compression.decompress(
            wasmBytes,
            function(decompressed) {
              t.complete(decompressed);
            }
          );
          return;
        }

        return originalDownloadJob.call(this, e, t);
      };
    }

    async function startUnity() {
      // Step 1: Extract wasm bytes from the zip we host on Vercel
      await extractWasm();

      // Step 2: Load UnityLoader.js (served from our Build/ folder)
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "Build/UnityLoader.js";
        s.onload = resolve;
        s.onerror = () => reject(new Error("Failed to load UnityLoader.js"));
        document.head.appendChild(s);
      });

      // Step 3: Patch downloadJob AFTER UnityLoader is loaded
      patchUnityLoader();

      // Step 4: Build the Unity 2019 config.
      // wasmCodeUrl must end in ".unityweb" for UnityLoader to schedule a download.
      // resolveBuildUrl() prepends "Build/" to relative URLs, so omit it here.
      const config = {
        companyName:    "Dani",
        productName:    "Karlson",
        productVersion: "0.1",
        dataUrl:           CDN + "tyj.data.unityweb",
        wasmCodeUrl:       "tyj.wasm.code.unityweb",   // -> resolves to Build/tyj.wasm.code.unityweb, intercepted
        wasmFrameworkUrl:  CDN + "tyj.wasm.framework.js",
        graphicsAPI:       ["WebGL 2.0"],
        webglContextAttributes: { preserveDrawingBuffer: false },
        splashScreenStyle: "Dark",
        backgroundColor:   "#231F20",
        developmentBuild:  false,
        multithreading:    false,
        unityVersion:      "2019.2.6f1"
      };

      // Step 5: UnityLoader.instantiate 2nd arg MUST be a URL string pointing to JSON.
      // Serve the config object as a blob URL.
      const configUrl = URL.createObjectURL(
        new Blob([JSON.stringify(config)], { type: "application/json" })
      );

      window.addEventListener("resize", resizeUnityContainer);
      resizeUnityContainer();

      // Step 6: Instantiate
      UnityLoader.instantiate("unityContainer", configUrl, {
        onProgress: UnityLoader.Progress.handler,
        Module: {
          onRuntimeInitialized: function() {
            const el = document.getElementById("loading-text");
            if (el) el.remove();
          }
        }
      });
    }

    window.addEventListener("load", startUnity);
  </script>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <div id="unityContainer"></div>
</body>
</html>
